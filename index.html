<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trợ Lý Gợi Ý Nước Đi Cờ Vua</title>
    <!-- Nhúng CSS của bàn cờ -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-color: #eef2f3; 
            padding: 20px;
            margin: 0;
        }
        .container { 
            max-width: 500px; 
            margin: 30px auto; 
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        h2 {
            color: #2c3e50;
            margin-top: 0;
        }
        #my-board { 
            width: 100%; 
            max-width: 400px;
            margin: 20px auto; 
        }
        /* Hiệu ứng làm nổi bật ô cờ đang được chọn giống Chess.com */
        .highlight-square {
            box-shadow: inset 0 0 3px 3px yellow;
        }
        .controls { 
            margin-bottom: 20px; 
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }
        .row {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            width: 100%;
        }
        label {
            font-weight: bold;
            color: #34495e;
        }
        select { 
            padding: 8px 12px; 
            font-size: 15px; 
            border-radius: 6px; 
            border: 1px solid #ccc;
            background-color: #fff;
            cursor: pointer;
        }
        button { 
            padding: 10px 20px; 
            font-size: 15px; 
            font-weight: bold;
            cursor: pointer; 
            border-radius: 6px; 
            border: none;
            transition: background 0.2s;
            width: 100%;
            max-width: 200px;
        }
        #hint-btn { 
            background-color: #27ae60; 
            color: white; 
        }
        #hint-btn:hover { 
            background-color: #219653; 
        }
        #reset-btn { 
            background-color: #7f8c8d; 
            color: white; 
        }
        #reset-btn:hover { 
            background-color: #95a5a6; 
        }
        #suggestion { 
            margin-top: 20px; 
            padding: 12px;
            font-size: 16px; 
            font-weight: bold; 
            color: #2980b9; 
            background-color: #e8f4f8;
            border-radius: 6px;
            border-left: 5px solid #2980b9;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🤖 Trợ Lý Cờ Vua Thiên Tài</h2>
    
    <div class="controls">
        <div class="row">
            <label for="color-select">Bạn cầm quân: </label>
            <select id="color-select">
                <option value="white">Trắng (Đi trước)</option>
                <option value="black">Đen (Đi sau)</option>
            </select>
        </div>
        
        <div class="row">
            <button id="hint-btn">🎯 Gợi Ý Nước Đi</button>
            <button id="reset-btn">🔄 Chơi lại</button>
        </div>
    </div>

    <!-- Nơi hiển thị bàn cờ -->
    <div id="my-board"></div>
    
    <!-- Nơi hiển thị kết quả gợi ý -->
    <div id="suggestion">Xếp cờ và bấm nút để nhận gợi ý nước đi!</div>
</div>

<!-- Nhúng các thư viện cần thiết -->
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

<script>
    let board = null;
    let game = new Chess();
    let myColor = 'white';
    
    // Biến lưu trữ ô cờ đang được click chọn trước đó
    let sourceSquare = null;

    // Khởi tạo bàn cờ
    function initBoard() {
        const config = {
            draggable: true,
            position: 'start',
            orientation: myColor,
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };
        board = Chessboard('my-board', config);

        // Kích hoạt tính năng click vào ô cờ để di chuyển (Chess.com style)
        setupClickMove();
    }

    // Không cho phép đi quân sai lượt hoặc khi game kết thúc
    function onDragStart (source, piece, position, orientation) {
        if (game.game_over()) return false;
        
        // Ngăn chặn đi quân cờ của đối thủ khi chưa tới lượt
        if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
            (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
            return false;
        }
    }

    // Xử lý khi kéo thả quân cờ trực tiếp
    function onDrop (source, target) {
        removeHighlight();
        sourceSquare = null;

        let move = game.move({
            from: source,
            to: target,
            promotion: 'q'
        });

        if (move === null) return 'snapback';
    }

    function onSnapEnd () {
        board.position(game.fen());
    }

    // --- LOGIC CLICK-TO-MOVE (GIỐNG CHESS.COM) ---
    function setupClickMove() {
        // Lắng nghe sự kiện click chuột vào các ô cờ
        $('#my-board').on('click', '.square-55d63', function() {
            if (game.game_over()) return;

            let square = $(this).attr('data-square');
            let piece = game.get(square);

            // Nếu chưa chọn ô nguồn (sourceSquare)
            if (sourceSquare === null) {
                // Nếu bấm vào ô có quân cờ và quân đó phải đúng lượt đi hiện tại
                if (piece && piece.color === game.turn()) {
                    sourceSquare = square;
                    addHighlight(square);
                }
            } else {
                // Nếu đã chọn ô nguồn trước đó rồi, bấm ô thứ 2 sẽ thực hiện đi quân
                let move = game.move({
                    from: sourceSquare,
                    to: square,
                    promotion: 'q' // Tự động phong Hậu
                });

                // Nếu nước đi hợp lệ
                if (move !== null) {
                    board.position(game.fen());
                    removeHighlight();
                    sourceSquare = null;
                } else {
                    // Nếu nước đi lỗi, nhưng lại bấm vào một quân cờ khác cùng màu -> Đổi lựa chọn sang quân mới
                    if (piece && piece.color === game.turn()) {
                        removeHighlight();
                        sourceSquare = square;
                        addHighlight(square);
                    } else {
                        // Bấm trượt hoặc đi sai luật hoàn toàn -> Hủy chọn
                        removeHighlight();
                        sourceSquare = null;
                    }
                }
            }
        });
    }

    // Thêm viền vàng nổi bật cho ô đang chọn
    function addHighlight(square) {
        $('#my-board .square-' + square).addClass('highlight-square');
    }

    // Xóa viền vàng
    function removeHighlight() {
        $('#my-board .square-55d63').removeClass('highlight-square');
    }
    // ---------------------------------------------

    // Đổi bên
    $('#color-select').change(function() {
        myColor = $(this).val();
        board.orientation(myColor);
        removeHighlight();
        sourceSquare = null;
    });

    // Làm mới game
    $('#reset-btn').click(function() {
        game.reset();
        board.start();
        removeHighlight();
        sourceSquare = null;
        $('#suggestion').text('Xếp cờ và bấm nút để nhận gợi ý nước đi!');
    });

    // Gọi AI Stockfish gợi ý nước đi
    $('#hint-btn').click(function() {
        if (game.game_over()) {
            $('#suggestion').text('Trận đấu đã kết thúc!');
            return;
        }

        let fen = game.fen();
        $('#suggestion').text('🤖 Thiên tài đang suy nghĩ...');

        $.getJSON(`https://stockfish.online/api/s/v2.php?fen=${encodeURIComponent(fen)}&depth=12`, function(data) {
            if (data && data.success && data.bestmove) {
                let bestMove = data.bestmove.split(' ')[1] || data.bestmove;
                
                if (bestMove === '(none)') {
                    $('#suggestion').text('🏁 Không còn nước đi nào hợp lệ (Chiếu bí hoặc Hòa).');
                    return;
                }

                let from = bestMove.substring(0, 2);
                let to = bestMove.substring(2, 4);
                
                $('#suggestion').html(`💡 Nước đi tốt nhất: Di chuyển từ ô <b style="color:#e74c3c">${from.toUpperCase()}</b> sang ô <b style="color:#27ae60">${to.toUpperCase()}</b>`);
            } else {
                $('#suggestion').text('❌ Không tìm thấy nước đi phù hợp.');
            }
        }).fail(function() {
            $('#suggestion').text('❌ Lỗi kết nối đến máy chủ AI!');
        });
    });

    $(document).ready(function() {
        initBoard();
    });
</script>
</body>
</html>
